# Local Postgres for Archmind development. Point DATABASE_URL in .env at this,
# e.g. postgresql://archmind:archmind@localhost:5432/archmind
# Run: docker compose up -d
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: archmind
      POSTGRES_PASSWORD: archmind
      POSTGRES_DB: archmind
    ports: ["5432:5432"]
    volumes:
      - pg:/var/lib/postgresql/data

volumes:
  pg:
