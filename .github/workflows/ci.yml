name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-dummy-jwt-secret-not-for-prod
      ENCRYPTION_KEY: ci-dummy-encryption-key-32-bytes
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      GITHUB_CLIENT_ID: ci-dummy-client-id
      GITHUB_CLIENT_SECRET: ci-dummy-client-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm test
      - run: npm run build
